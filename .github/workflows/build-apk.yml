name: Build Android APK

# Manually triggered. Builds an installable .apk on Expo's EAS cloud and prints
# a download link. Requires an EXPO_TOKEN repo secret (see README / step below).

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install app deps
        run: npm ci || npm install

      - name: Set up EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Link/create the EAS project
        run: eas init --non-interactive --force

      - name: Build APK (preview profile)
        run: eas build --platform android --profile preview --non-interactive --wait

      - name: Print download link
        if: always()
        run: |
          echo "Build finished. Get the downloadable .apk from your Expo dashboard:"
          echo "https://expo.dev/accounts/<your-username>/projects/current-affairs-app/builds"
          echo "(the direct artifact URL is also in the 'Build APK' step logs above)"
